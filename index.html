<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORJA">
<meta name="theme-color" content="#0a0a0a">
<title>FORJA</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
:root{--bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--bd:#2a2a2a;--tx:#f0ece4;--dm:#8a8680;--ac:#e85d3a;--grn:#4ade80;--yel:#facc15;--blu:#60a5fa}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);height:100%;overflow:hidden;overscroll-behavior:none}
.app{height:100dvh;display:flex;flex-direction:column}
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 120px;scrollbar-width:none}
.cnt::-webkit-scrollbar{display:none}
.nav{display:flex;justify-content:space-around;padding:10px 0 24px;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--dm);font-size:10px;font-family:inherit;font-weight:500;padding:4px 12px;cursor:pointer}
.nb.a{color:var(--ac)}
.hdr{padding:20px 0 8px;position:sticky;top:0;z-index:50;background:var(--bg)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;background:linear-gradient(135deg,var(--ac),#f4a261);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cd{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px}
.er{background:var(--s2);border-radius:12px;padding:14px;margin-bottom:10px;border-left:3px solid var(--ac)}
.cl{font-size:11px;color:var(--dm);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px;margin-top:16px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;background:var(--ac);color:white}
.btn:active{transform:scale(.97)}
.sb{padding:6px 12px;font-size:11px;font-family:'DM Sans',sans-serif;background:var(--s1);border:1px solid var(--bd);border-radius:8px;color:var(--tx);cursor:pointer}
.li{width:60px;padding:7px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:inherit;font-size:14px;text-align:center;outline:none}
.li:focus{border-color:var(--ac)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end}
.ms{background:var(--s1);width:100%;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;padding:20px 16px 40px}
.ms h3{font-size:14px;color:var(--ac);margin:14px 0 6px;font-weight:600}
.ms p,.ms li{font-size:13px;line-height:1.6;color:var(--dm)}
.ms ul{padding-left:18px}
.ms li{margin-bottom:4px}
.timer-bar{position:fixed;top:0;left:0;right:0;z-index:200;padding:12px 16px;background:linear-gradient(135deg,#e85d3a,#d04a29);display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);cursor:pointer}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>

function saveU(){const a=ld();a._u=U;sv(a)}

function getWO(di){if(!U)return null;const bw=Math.floor((Date.now()-new Date(U.start).getTime())/(7*864e5));const w=bw+weekOff;const p=((w%2)+2)%2;return WO[p*5+di]}
function getWD(){const n=new Date(),dow=n.getDay(),mo=dow===0?-6:1-dow,m=new Date(n);m.setDate(n.getDate()+mo+weekOff*7);const f=new Date(m);f.setDate(m.getDate()+4);const fmt=d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric"});const wn=Math.floor((m.getTime()-new Date(U?U.start:Date.now()).getTime())/(7*864e5))+1;return{ms:fmt(m),fs:fmt(f),wn:Math.max(1,wn),y:m.getFullYear()}}

function getRec(logs,reps,eid){
  const p=reps.split("-").map(Number),lo=p[0],hi=p[1];
  const isDB=["incline_db_press","db_curl","db_overhead_ext","db_cuban_press"].includes(eid);
  const wj=isDB?2.5:5;
  if(!logs||!logs.length)return{t:"new",m:"First session - pick starting weight",d:"Choose weight for "+lo+" reps with ~2 reps left.",nw:null,nr:null};
  const last=logs[logs.length-1],lw=last.sets[0]?last.sets[0].w:0;
  const avg=Math.round(last.sets.reduce((s,x)=>s+x.r,0)/last.sets.length);
  const allTop=last.sets.every(s=>s.r>=hi);
  const atW=logs.filter(l=>l.sets[0]&&l.sets[0].w===lw).length;
  if(logs.length>0&&logs.length%12===0){const dw=Math.round(lw*.6);return{t:"del",m:"DELOAD WEEK",d:"Use "+dw+" lbs (60%). Strategic recovery.",nw:dw,nr:lo+"-"+hi}}
  if(allTop){const nw=lw+wj;return{t:"inc",m:"INCREASE to "+nw+" lbs",d:"Hit "+hi+" reps all sets! Go up. Reps drop to ~"+lo+", build back up.",nw:nw,nr:lo+"-"+(lo+2)}}
  if(atW>=3&&!allTop)return{t:"mic",m:"MICRO-PROGRESS",d:atW+" sessions at "+lw+"lbs. Add 1 rep to one set or slow eccentric to 3s.",nw:lw,nr:avg+"->"+(avg+1)};
  const tgt=Math.min(avg+1,hi);return{t:"mnt",m:"BUILD to "+tgt+" reps",d:"At "+lw+"lbs avg "+avg+" reps. ~"+Math.max(1,hi-avg)+" session(s) to increase.",nw:lw,nr:tgt+"/set"}
}

function startTimer(sec){clearInterval(timerInt);timerSec=sec;timerInt=setInterval(()=>{timerSec--;if(timerSec<=0){clearInterval(timerInt);timerInt=null;if("vibrate"in navigator)navigator.vibrate([200,100,200])}render()},1000);render()}

function saveSess(){
  const wo=getWO(selDay);if(!wo)return;
  const td=new Date().toISOString().split("T")[0];let any=false;
  wo.ex.forEach(e=>{
    const sets=[];
    for(let i=0;i<e.s;i++){const w=parseFloat(logD[e.id+"-"+i+"-w"])||0,r=parseInt(logD[e.id+"-"+i+"-r"])||0;if(w>0&&r>0){sets.push({w,r});any=true}}
    if(sets.length){if(!U.logs[e.id])U.logs[e.id]=[];U.logs[e.id]=U.logs[e.id].filter(l=>l.date!==td);U.logs[e.id].push({date:td,sets})}
  });
  if(any){if(U.lastS!==td){U.sess=(U.sess||0)+1;U.lastS=td}saveU();logD={};document.querySelector(".cnt").scrollTo({top:0,behavior:"smooth"});render()}
}

function h(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

  const wo=selDay!==null?getWO(selDay):null;

    // Week nav
    const wl=weekOff===0?"This Week":weekOff===1?"Next Week":weekOff===-1?"Last Week":(weekOff>0?"+":"")+weekOff+" weeks";
    out+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;background:var(--s1);border-radius:12px;padding:8px 12px;border:1px solid var(--bd)"><button onclick="weekOff--;render()" style="background:none;border:none;color:var(--ac);font-size:22px;cursor:pointer;padding:6px 10px">&lt;</button><div style="text-align:center"><div style="font-weight:700;font-size:14px;color:${weekOff===0?"var(--ac)":"var(--tx)"}">${wl}</div><div style="font-size:11px;color:var(--dm)">${wd.ms} - ${wd.fs}, ${wd.y} | Wk ${wd.wn}</div></div><button onclick="weekOff++;render()" style="background:none;border:none;color:var(--ac);font-size:22px;cursor:pointer;padding:6px 10px">&gt;</button></div>`;

      // Time estimate

      out+=`<div class="cd"><div style="font-weight:700;font-size:16px">${h(wo.name)}</div><div style="font-size:12px;color:var(--dm);margin-top:2px">2s eccentric | ${wo.ex.length} exercises</div><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap"><div style="background:var(--bg);border-radius:8px;padding:5px 10px;font-size:12px"><span style="color:var(--ac);font-weight:700">~${Math.round(5+lm+cd.d)}min</span> total</div><div style="background:var(--bg);border-radius:8px;padding:5px 10px;font-size:12px"><span style="font-weight:600">~${Math.round(5+lm)}min</span> weights</div><div style="background:var(--bg);border-radius:8px;padding:5px 10px;font-size:12px"><span style="color:var(--grn);font-weight:600">${cd.d}min</span> cardio</div></div><div style="font-size:11px;color:var(--dm);margin-top:8px">Order: <span style="color:var(--blu)">Warm-up</span> → <span style="color:var(--ac)">Weights</span> → <span style="color:var(--grn)">Cardio (last)</span></div></div>`;
      // Warmup
      out+=`<div class="cl">POSTURE WARM-UP (5 min)</div>`;
      warmup.forEach(w=>{const pd=PEX[w.id];out+=`<div class="er" style="border-left-color:var(--blu)"><div style="display:flex;justify-content:space-between;align-items:start"><div style="flex:1"><span style="display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(96,165,250,.15);color:var(--blu)">POSTURE</span><div style="font-weight:600;font-size:14px;margin-top:4px">${pd?h(pd.name):w.id}</div><div style="font-size:12px;color:var(--dm);margin-top:2px">${h(w.s)}</div></div><button class="sb" onclick="showPosture('${w.id}')">HOW-TO</button></div></div>`});
      // Progress bar
      const td2=new Date().toISOString().split("T")[0];
      if(weekOff===0){const done=wo.ex.filter(e=>(U.logs[e.id]||[]).some(l=>l.date===td2)).length;if(done>0)out+=`<div style="background:var(--s1);border-radius:10px;padding:10px 14px;margin:12px 0;border:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="font-weight:600">Today</span><span style="color:${done===wo.ex.length?"var(--grn)":"var(--ac)"};font-weight:700">${done}/${wo.ex.length}</span></div><div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="height:100%;background:${done===wo.ex.length?"var(--grn)":"linear-gradient(90deg,var(--ac),#f4a261)"};border-radius:3px;width:${done/wo.ex.length*100}%;transition:width .5s"></div></div></div>`}

      wo.ex.forEach((e,i)=>{

        out+=`<div style="display:flex;justify-content:space-between;align-items:start"><div style="flex:1"><div style="display:flex;align-items:center;gap:6px"><div style="font-weight:600;font-size:14px">${isDone?"✅ ":""}${i+1}. ${h(d.name)}</div><span style="font-size:9px;font-weight:700;color:${mc};background:${mc}15;padding:1px 6px;border-radius:4px">${ML[e.id]||""}</span></div><div style="font-size:11px;color:var(--dm);margin-top:2px">${h(d.pri)}</div></div><button class="sb" onclick="showModal('${e.id}')">HOW-TO</button></div>`;
        if(d.pos)out+=`<span style="display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(96,165,250,.12);color:var(--blu);margin-top:4px">POSTURE +</span>`;
        // Prescription
        out+=`<div style="display:flex;align-items:center;gap:10px;margin-top:10px;background:var(--bg);border-radius:10px;padding:10px 12px"><div style="flex:1"><div style="font-size:20px;font-weight:700;font-family:'Bebas Neue',sans-serif;color:var(--ac);letter-spacing:1px">${e.s} x ${h(e.r)}</div><div style="font-size:11px;color:var(--dm)">Rest ${e.rst}s</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--dm)">Next Step</div><div style="font-size:16px;font-weight:700;color:${col}">${rec.nw?rec.nw+" lbs":"Set weight"}</div>${rec.nr?`<div style="font-size:10px;color:var(--dm)">${h(String(rec.nr))}</div>`:""}</div></div>`;
        // Suggestion
        if(!isDone)out+=`<div style="margin-top:8px;background:${bg2};border-radius:10px;padding:10px 12px"><div style="font-size:12px;font-weight:700;color:${col}">${h(rec.m)} <span style="font-size:10px;color:var(--dm);background:var(--bg);padding:2px 6px;border-radius:4px;margin-left:4px">SUGGESTION</span></div><p style="font-size:11px;color:var(--dm);line-height:1.6;margin-top:6px">${h(rec.d)}</p></div>`;
        out+=`<div style="font-size:11px;color:var(--dm);margin-top:6px;font-style:italic">${h(e.n)}</div>`;
        // Logging
        if(weekOff===0&&!isDone){
          out+=`<div style="margin-top:10px;border-top:1px solid var(--bd);padding-top:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-size:11px;color:var(--ac);font-weight:600">LOG SETS:</div>${lw?`<button class="sb" style="font-size:10px;padding:3px 8px" onclick="autoFill('${e.id}',${e.s},'${lw}')">Fill ${lw}lbs</button>`:""}</div>`;

        }
        if(isDone)out+=`<div style="margin-top:8px;font-size:12px;color:var(--grn);font-weight:600">Logged: ${tl.sets.map(s=>s.w+"x"+s.r).join(", ")}</div>`;

    }
  } else {

    });

  // Nav
  const navH=`<nav class="nav"><button class="nb ${tab==="today"?"a":""}" onclick="tab='today';render()"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Workout</button><button class="nb ${tab==="progress"?"a":""}" onclick="tab='progress';render()"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>Progress</button></nav>`;
  
  // Timer
  let timerH="";
  if(timerInt&&timerSec>0)timerH=`<div class="timer-bar" onclick="clearInterval(timerInt);timerInt=null;timerSec=0;render()"><span style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:white;letter-spacing:3px">${Math.floor(timerSec/60)}:${String(timerSec%60).padStart(2,"0")}</span><span style="font-size:12px;color:rgba(255,255,255,.7)">REST - tap to dismiss</span></div>`;
  
  app.innerHTML=`<div class="cnt" id="scroll">${out}</div>${navH}${timerH}`;

// Modal functions
function showModal(id){
  const d=EX[id],t=d.tech;
  const img=EX_IMAGES[id];const vid=EX_VIDEOS[id];
  let c=`<div class="mo" onclick="this.remove()"><div class="ms" onclick="event.stopPropagation()"><div style="width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px"></div><div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px">${h(d.name)}</div><div style="font-size:12px;color:var(--dm)">${h(d.machine)}</div>`;
  if(d.pos)c+=`<span style="display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(96,165,250,.15);color:var(--blu);margin-top:6px">HELPS POSTURE</span>`;
  if(img)c+=`<div style="margin-top:14px;border-radius:12px;overflow:hidden"><img src="${img}" style="width:100%;display:block;border-radius:12px" onerror="this.style.display='none'"></div>`;
  if(vid)c+=`<div style="margin-top:10px"><a href="https://www.youtube.com/shorts/${vid}" target="_blank" rel="noopener noreferrer" style="display:block;position:relative;border-radius:12px;overflow:hidden;background:#000;text-decoration:none"><img src="https://img.youtube.com/vi/${vid}/hqdefault.jpg" style="width:100%;display:block;border-radius:12px"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)"><div style="width:60px;height:60px;border-radius:50%;background:rgba(232,93,58,.9);display:flex;align-items:center;justify-content:center"><div style="width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:20px solid white;margin-left:4px"></div></div></div></a><div style="font-size:11px;color:var(--ac);text-align:center;margin-top:6px;font-weight:600">▶ Tap to watch</div></div>`;
  c+=`<h3>SETUP</h3><p>${h(t.setup)}</p><h3>EXECUTION</h3><p>${h(t.exec)}</p><h3>ECCENTRIC (2-3s)</h3><p>${h(t.ecc)}</p><h3>MENTAL CUES</h3><ul>${t.cues.map(x=>"<li>"+h(x)+"</li>").join("")}</ul><h3>AVOID</h3><ul>${t.err.map(x=>"<li>"+h(x)+"</li>").join("")}</ul><h3>MUSCLES</h3><p><strong style="color:var(--tx)">Primary:</strong> ${h(d.pri)}</p><p><strong style="color:var(--tx)">Secondary:</strong> ${h(d.sec)}</p><button class="btn" style="margin-top:20px" onclick="this.closest('.mo').remove()">GOT IT</button></div></div>`;
  document.body.insertAdjacentHTML("beforeend",c);
}

function showPosture(id){
  const pd=PEX[id];if(!pd)return;const img=POSTURE_IMAGES[id];
  let c=`<div class="mo" onclick="this.remove()"><div class="ms" onclick="event.stopPropagation()"><div style="width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px"></div><div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px">${h(pd.name)}</div><span style="display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(96,165,250,.15);color:var(--blu);margin-top:6px">POSTURE</span>`;
  if(img)c+=`<div style="margin-top:14px;border-radius:12px;overflow:hidden"><img src="${img}" style="width:100%;display:block;border-radius:12px" onerror="this.style.display='none'"></div>`;
  c+=`<h3 style="color:var(--blu)">HOW TO PERFORM</h3><p>${h(pd.tech)}</p><h3 style="color:var(--blu)">KEY CUES</h3><ul>${pd.cues.map(x=>"<li>"+h(x)+"</li>").join("")}</ul><button class="btn" style="margin-top:20px;background:var(--blu)" onclick="this.closest('.mo').remove()">GOT IT</button></div></div>`;
  document.body.insertAdjacentHTML("beforeend",c);
}

function autoFill(id,sets,w){for(let i=0;i<sets;i++)logD[id+"-"+i+"-w"]=w;render()}

init();

// Lazy-load images.js AFTER app is interactive
(function(){
  var s=document.createElement('script');
  s.src='images.js';
  s.async=true;
  s.onload=function(){render()};  // re-render to show images
  s.onerror=function(){console.log('images.js not found — running without images')};
  document.body.appendChild(s);
})();
</script>
</body>
